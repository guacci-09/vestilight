/* 檔案館核心大腦 (雙軌自動收割最終版)          */
/* ========================================= */

// ---------------------------------
// [自動化引擎 A] 短篇集標籤收割
// ---------------------------------
function initManualStoryFilter() {
    if (!document.getElementById('collection-flag')) return;
    const filterContainer = document.getElementById('dynamic-filter-container');
    const storyItems = document.querySelectorAll('.story-card'); 
    if (!filterContainer || storyItems.length === 0) return;

    let uniqueTags = new Set();
    storyItems.forEach(item => {
        const tagsStr = item.getAttribute('data-tags');
        if (tagsStr) {
            tagsStr.split(',').forEach(tag => {
                const cleanTag = tag.trim();
                if (cleanTag) uniqueTags.add(cleanTag);
            });
        }
    });

    if (uniqueTags.size > 0) {
        let buttonsHTML = '<div class="filter-group">';
        buttonsHTML += '<span class="filter-label">故事標籤：</span>'; 
        buttonsHTML += '<button class="char-filter-btn story-filter-btn active" data-filter="all">全部</button>';
        Array.from(uniqueTags).sort().forEach(tag => {
            buttonsHTML += `<button class="char-filter-btn story-filter-btn" data-filter="${tag}">${tag}</button>`;
        });
        buttonsHTML += '</div>';
        filterContainer.innerHTML = buttonsHTML;
    }
}

// ---------------------------------
// [自動化引擎 B] 角色列表雙軌收割
// ---------------------------------
function initCharFilter() {
    if (!document.getElementById('character-flag')) return;
    const filterContainer = document.getElementById('char-dynamic-filter-container');
    const charItems = document.querySelectorAll('.char-item'); 
    if (!filterContainer || charItems.length === 0) return;

    let uniqueFactions = new Set();
    let uniqueChapters = new Set();

    // 分別收割勢力與篇章
    charItems.forEach(item => {
        const factionStr = item.getAttribute('data-faction');
        if (factionStr) factionStr.split(',').forEach(t => { if(t.trim()) uniqueFactions.add(t.trim()); });

        const chapterStr = item.getAttribute('data-chapter');
        if (chapterStr) chapterStr.split(',').forEach(t => { if(t.trim()) uniqueChapters.add(t.trim()); });
    });

    let html = '';

    // 生成第一排：關聯勢力
    if (uniqueFactions.size > 0) {
        html += '<div class="filter-group" style="margin-bottom: 15px;">';
        html += '<span class="filter-label">關聯勢力：</span>';
        html += '<button class="char-filter-btn active" data-filter="all">全部</button>';
        Array.from(uniqueFactions).sort().forEach(tag => {
            html += `<button class="char-filter-btn" data-filter="${tag}" data-type="faction">${tag}</button>`;
        });
        html += '</div>';
    }

    // 生成第二排：出場篇章
    if (uniqueChapters.size > 0) {
        html += '<div class="filter-group">';
        html += '<span class="filter-label">出場篇章：</span>';
        // 依照你的截圖，第二排不需要全部按鈕，保持整潔
        Array.from(uniqueChapters).sort().forEach(tag => {
            html += `<button class="char-filter-btn" data-filter="${tag}" data-type="chapter">${tag}</button>`;
        });
        html += '</div>';
    }

    filterContainer.innerHTML = html;
}

// 載入完成時，同時啟動兩個引擎
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => {
        initManualStoryFilter();
        initCharFilter();
    });
} else {
    initManualStoryFilter();
    initCharFilter();
}


// ---------------------------------
// [全域事件委派大腦] 處理所有點擊
// ---------------------------------
document.addEventListener('click', function(e) {
    
    // ===== 系統一：角色雙軌動態篩選器 =====
    const charFilterBtn = e.target.closest('.char-filter-btn:not(.story-filter-btn)');
    if (charFilterBtn) {
        document.querySelectorAll('.char-filter-btn:not(.story-filter-btn)').forEach(b => b.classList.remove('active'));
        charFilterBtn.classList.add('active');

        const filterValue = charFilterBtn.getAttribute('data-filter');
        const filterType = charFilterBtn.getAttribute('data-type'); // 判斷點的是 faction 還是 chapter

        const charItems = document.querySelectorAll('.char-item');

        charItems.forEach(item => {
            if (filterValue === 'all') {
                item.style.setProperty('display', 'flex', 'important');
            } else {
                // 根據按鈕類型，去檢查對應的屬性
                const targetAttr = (filterType === 'faction') ? 'data-faction' : 'data-chapter';
                const tagsStr = item.getAttribute(targetAttr) || '';
                const tagsArray = tagsStr.split(',').map(t => t.trim());
                
                if (tagsArray.includes(filterValue)) {
                    item.style.setProperty('display', 'flex', 'important');
                } else {
                    item.style.setProperty('display', 'none', 'important');
                }
            }
        });
        return;
    }

    // ===== 系統六：手刻短篇集動態篩選器 =====
    const storyFilterBtn = e.target.closest('.story-filter-btn');
    if (storyFilterBtn) {
        document.querySelectorAll('.story-filter-btn').forEach(b => b.classList.remove('active'));
        storyFilterBtn.classList.add('active');

        const filterValue = storyFilterBtn.getAttribute('data-filter');
        const storyItems = document.querySelectorAll('.story-card');

        storyItems.forEach(item => {
            if (filterValue === 'all') {
                item.style.setProperty('display', 'block', 'important'); 
            } else {
                const tagsStr = item.getAttribute('data-tags') || '';
                const tagsArray = tagsStr.split(',').map(t => t.trim());
                
                if (tagsArray.includes(filterValue)) {
                    item.style.setProperty('display', 'block', 'important');
                } else {
                    item.style.setProperty('display', 'none', 'important');
                }
            }
        });
        return; 
    }

    // ===== 系統二：相簿縮圖切換 =====
    const thumb = e.target.closest('.vl-thumb');
    if (thumb) {
        const gallery = thumb.closest('.vl-gallery');
        if(!gallery) return;
        const mainDisplay = gallery.querySelector('.vl-main-display');
        gallery.querySelectorAll('.vl-thumb').forEach(t => t.classList.remove('active'));
        thumb.classList.add('active');
        const newSrc = thumb.querySelector('img').src;
        mainDisplay.innerHTML = '<img class="vl-main-img" src="' + newSrc + '" style="opacity:1;">';
        return;
    }

    // ===== 系統三：相簿箭頭切換 =====
    const arrow = e.target.closest('.vl-arrow');
    if (arrow) {
        const gallery = arrow.closest('.vl-gallery');
        if(!gallery) return;
        const thumbs = Array.from(gallery.querySelectorAll('.vl-thumb'));
        const mainDisplay = gallery.querySelector('.vl-main-display');
        if(!mainDisplay || thumbs.length === 0) return;

        let currentIndex = thumbs.findIndex(t => t.contains('active'));
        if (currentIndex === -1) currentIndex = 0;

        if (arrow.classList.contains('vl-prev')) {
            currentIndex = currentIndex - 1;
            if (currentIndex < 0) currentIndex = thumbs.length - 1;
        } else {
            currentIndex = currentIndex + 1;
            if (currentIndex >= thumbs.length) currentIndex = 0;
        }

        thumbs.forEach(t => t.classList.remove('active'));
        thumbs[currentIndex].classList.add('active');
        const newSrc = thumbs[currentIndex].querySelector('img').src;
        mainDisplay.innerHTML = '<img class="vl-main-img" src="' + newSrc + '" style="opacity:1;">';
        return;
    }

    // ===== 系統四：點擊主圖開啟放大鏡 =====
    const mainImg = e.target.closest('.vl-main-img');
    if (mainImg) {
        let lightbox = document.getElementById('vl-lightbox');
        if (!lightbox) {
            lightbox = document.createElement('div');
            lightbox.id = 'vl-lightbox';
            lightbox.innerHTML = '<div id="vl-lightbox-close">&times;</div><img src="" alt="放大圖片">';
            document.body.appendChild(lightbox);
        }
        lightbox.querySelector('img').src = mainImg.src;
        lightbox.classList.add('active');
        return;
    }

    // ===== 系統五：點擊關閉放大鏡 =====
    const lightbox = document.getElementById('vl-lightbox');
    if (lightbox && lightbox.classList.contains('active')) {
        if (e.target.id === 'vl-lightbox' || e.target.id === 'vl-lightbox-close') {
            lightbox.classList.remove('active');
        }
    }

});</script></body></html>
