/* 檔案館核心大腦 (終極事件委派版)           */
/* 解決載入順序問題，確保按鈕與相簿絕對有效  */
/* ========================================= */
document.addEventListener('click', function(e) {
    
    // ---------------------------------
    // [系統一] 角色動態篩選器
    // ---------------------------------
    const filterBtn = e.target.closest('.char-filter-btn');
    if (filterBtn) {
        // 移除所有按鈕的 active 狀態
        document.querySelectorAll('.char-filter-btn').forEach(b => b.classList.remove('active'));
        // 讓當前點擊的按鈕亮起
        filterBtn.classList.add('active');

        // 取得篩選關鍵字
        const filterValue = filterBtn.getAttribute('data-filter');
        const charItems = document.querySelectorAll('.char-item');

        charItems.forEach(item => {
            if (filterValue === 'all') {
                item.style.setProperty('display', 'flex', 'important');
            } else {
                const tags = item.getAttribute('data-tags') || '';
                // 檢查角色身上的標籤是否包含按鈕的關鍵字
                if (tags.includes(filterValue)) {
                    item.style.setProperty('display', 'flex', 'important');
                } else {
                    item.style.setProperty('display', 'none', 'important');
                }
            }
        });
        return; // 篩選完畢，結束動作
    }

    // ---------------------------------
    // [系統二] 相簿縮圖切換
    // ---------------------------------
    const thumb = e.target.closest('.vl-thumb');
    if (thumb) {
        const gallery = thumb.closest('.vl-gallery');
        if(!gallery) return;
        const mainDisplay = gallery.querySelector('.vl-main-display');
        
        gallery.querySelectorAll('.vl-thumb').forEach(t => t.classList.remove('active'));
        thumb.classList.add('active');

        const newSrc = thumb.querySelector('img').src;
        mainDisplay.innerHTML = '<img class="vl-main-img" src="' + newSrc + '" style="opacity:1;">';
        return;
    }

    // ---------------------------------
    // [系統三] 相簿箭頭切換
    // ---------------------------------
    const arrow = e.target.closest('.vl-arrow');
    if (arrow) {
        const gallery = arrow.closest('.vl-gallery');
        if(!gallery) return;
        const thumbs = Array.from(gallery.querySelectorAll('.vl-thumb'));
        const mainDisplay = gallery.querySelector('.vl-main-display');
        if(!mainDisplay || thumbs.length === 0) return;

        let currentIndex = thumbs.findIndex(t => t.classList.contains('active'));
        if (currentIndex === -1) currentIndex = 0;

        if (arrow.classList.contains('vl-prev')) {
            currentIndex = currentIndex - 1;
            if (currentIndex < 0) currentIndex = thumbs.length - 1;
        } else {
            currentIndex = currentIndex + 1;
            if (currentIndex >= thumbs.length) currentIndex = 0;
        }

        thumbs.forEach(t => t.classList.remove('active'));
        thumbs[currentIndex].classList.add('active');

        const newSrc = thumbs[currentIndex].querySelector('img').src;
        mainDisplay.innerHTML = '<img class="vl-main-img" src="' + newSrc + '" style="opacity:1;">';
        return;
    }

    // ---------------------------------
    // [系統四] 點擊主圖開啟放大鏡
    // ---------------------------------
    const mainImg = e.target.closest('.vl-main-img');
    if (mainImg) {
        let lightbox = document.getElementById('vl-lightbox');
        if (!lightbox) {
            lightbox = document.createElement('div');
            lightbox.id = 'vl-lightbox';
            lightbox.innerHTML = '<div id="vl-lightbox-close">&times;</div><img src="" alt="放大圖片">';
            document.body.appendChild(lightbox);
        }
        lightbox.querySelector('img').src = mainImg.src;
        lightbox.classList.add('active');
        return;
    }

    // ---------------------------------
    // [系統五] 點擊關閉放大鏡
    // ---------------------------------
    const lightbox = document.getElementById('vl-lightbox');
    if (lightbox && lightbox.classList.contains('active')) {
        if (e.target.id === 'vl-lightbox' || e.target.id === 'vl-lightbox-close') {
            lightbox.classList.remove('active');
        }
    }

});</script></body></html>
